<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="UniHash Gallery — explore 100% on-chain 24×24 Hash SVGs in an interactive 3D grid."
    />
    <title>UniHash Gallery · $HASH</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  </head>

  <body class="gallery-page">
    <header class="gallery-header">
      <a href="/" class="gallery-header-brand">
        <img src="/logo.svg" alt="" width="32" height="32" aria-hidden="true" />
        <p class="gallery-header-title">UniHash Gallery</p>
      </a>
      <nav class="gallery-header-nav" aria-label="Gallery navigation">
        <a href="/">Home</a>
        <a href="/#wallet">Wallet</a>
        <a href="/whitepaper.html">Whitepaper</a>
      </nav>
    </header>

    <div class="gallery-intro">
      <p class="gallery-intro-label">Gallery</p>
      <h1 class="gallery-intro-title">On-chain SVG grid</h1>
      <p class="gallery-intro-copy">
        120 Hash placeholders rendered as living 24×24 SVG art. Drag to explore, then switch layouts below.
      </p>
    </div>

    <div class="gallery-showcase" aria-live="polite">
      <p class="gallery-showcase-label">Live pattern</p>
      <div class="gallery-showcase-frame" id="gallery-showcase-frame">
        <svg id="gallery-showcase-svg" viewBox="0 0 24 24" role="img" aria-label="Animated Hash pattern preview"></svg>
      </div>

      <dl class="gallery-showcase-details" id="gallery-showcase-details">
        <div class="gallery-showcase-detail">
          <dt>Hash ID</dt>
          <dd id="gallery-showcase-hashid">#0000</dd>
        </div>
        <div class="gallery-showcase-detail">
          <dt>Owner wallet</dt>
          <dd id="gallery-showcase-owner">0x0000…0000</dd>
        </div>
        <div class="gallery-showcase-detail">
          <dt>Daily yield</dt>
          <dd id="gallery-showcase-yield">~0.000 $HASH / day</dd>
        </div>
      </dl>
    </div>

    <div id="gallery-container" aria-label="Interactive Hash gallery"></div>

    <div id="gallery-menu" aria-label="Gallery layouts">
      <button id="layout-table" type="button">Table</button>
      <button id="layout-sphere" type="button">Sphere</button>
      <button id="layout-helix" type="button">Helix</button>
      <button id="layout-grid" type="button">Grid</button>
    </div>

    <script type="module" src="/src/gallery-main.js"></script>
  </body>
</html>
