<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="UniChain V4">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#02040b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#ff1a6b"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1a6b"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="472" fill="none" stroke="url(#ring)" stroke-width="16"/>

  <g stroke="#f1f5f9" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="380" y1="335" x2="510" y2="420"/>
    <line x1="510" y1="420" x2="615" y2="370"/>
    <line x1="510" y1="420" x2="455" y2="525"/>
    <line x1="615" y1="370" x2="700" y2="455"/>
    <line x1="615" y1="370" x2="615" y2="510"/>
    <line x1="615" y1="510" x2="730" y2="585"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="380" cy="335" r="26" fill="#e5e7eb"/>
    <circle cx="510" cy="420" r="44" fill="#ff5b6e"/>
    <circle cx="615" cy="370" r="36" fill="#ff5b6e"/>
    <circle cx="455" cy="525" r="30" fill="#e5e7eb"/>
    <circle cx="700" cy="455" r="24" fill="#e5e7eb"/>
    <circle cx="615" cy="510" r="28" fill="#2dd4bf"/>
    <circle cx="730" cy="585" r="24" fill="#e5e7eb"/>
  </g>

  <text x="512" y="760" text-anchor="middle" font-size="116" font-family="'Fira Code', monospace" font-weight="700" letter-spacing="8" fill="url(#title)">UNICHAIN</text>
  <g stroke-width="4">
    <line x1="285" y1="832" x2="440" y2="832" stroke="#ff1a6b" opacity="0.9"/>
    <line x1="585" y1="832" x2="740" y2="832" stroke="#22d3ee" opacity="0.9"/>
  </g>
  <text x="512" y="852" text-anchor="middle" font-size="60" font-family="'Fira Code', monospace" font-weight="700" fill="#cbd5e1">V4</text>
</svg>
